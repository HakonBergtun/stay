<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking – Stay Bed & Breakfast</title>
  <link rel="stylesheet" href="css/hotellist.css">
  <link rel="stylesheet" href="css/bookingside.css">
</head>

<body>

<header class="header">
  <nav class="navbar">
    <a class="logo" href="#">Stay Bed & Breakfast</a>
    <ul class="menu">
      <li><a href="profile.html">Profile</a></li>
      <li><a href="bookingside.html">Bookings</a></li>
    </ul>
  </nav>

  <section class="searchbar">
    <form class="search-form">
      <label>
        Destination
        <input type="text" placeholder="Where are you going?">
      </label>
      <label>
        Check-in
        <input type="date" id="searchFrom">
      </label>
      <label>
        Check-out
        <input type="date" id="searchTo">
      </label>
      <label>
        Guests
        <input type="text" placeholder="2 adults">
      </label>
      <button type="submit">Search</button>
    </form>
  </section>
</header>

<main class="main">

  <aside class="filters">
    <h2>New Booking</h2>

    <form id="newBookingForm">
      <label>
        Room
        <select id="roomId" required>
          <option value="">Select room</option>
        </select>
      </label>

      <label>
        From
        <input type="date" id="fromDate" required>
      </label>

      <label>
        To
        <input type="date" id="toDate" required>
      </label>

      <label>
        Message
        <textarea id="message"></textarea>
      </label>

      <button class="btn-apply" type="submit">Book</button>
    </form>
  </aside>

  <section class="results">
    <div class="results-header">
      <div>
        <h1>My bookings</h1>
        <p class="results-meta" id="bookingCount">0 bookings</p>
      </div>
    </div>

    <div class="hotel-list" id="bookingsList">

      <article class="hotel">
        <div class="hotel-image">Room</div>

        <div class="hotel-info">
          <h2>Dobbeltrom med sjøutsikt</h2>
          <p>2026-01-10 → 2026-01-12</p>
          <p>Status: pending</p>

          <div class="hotel-price">
            <div>
              <p class="price"><strong>Booking #101</strong></p>
              <p class="price-label">userId: 1</p>
            </div>

            <div class="booking-actions">
              <button data-action="edit" data-id="101">Edit</button>
              <button data-action="delete" data-id="101">Cancel</button>
            </div>
          </div>
        </div>
      </article>

    </div>

    <p id="emptyState" style="display:none;">No bookings yet</p>
  </section>

</main>

<footer class="footer">
  <p>© 2026 Stay Bed & Breakfast</p>
</footer>

</body>
</html>
