<!doctype html<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking</title>
    <link rel="stylesheet" href="CSS/global.css" />
    <link rel="stylesheet" href="CSS/bookingside.css" />
  </head>
  <body>
    <header class="navbar">
      <a href="index.html" class="logo">
        <img src="/assets/logo.png" alt="Stay logo" />
      </a>

      <div class="hamburger" id="hamburger">
        <img src="assets/menu.png" alt="meny" />
      </div>

      <nav class="nav-links" id="nav-links">
        <a href="index.html">Hjem</a>
        <a href="Hotellist.html">Hotell</a>
        <a href="infoside.html">Info</a>
        <a href="bookingside.html">Booking</a>
        <a href="profile.html">Profil</a>
        <a href="register.html">Registrer</a>
        <a href="signin.html">Logg inn</a>
        <a href="kontaktoss.html">Kontakt Oss</a>
        <a href="FAQ.html">FAQ</a>
        <a href="omoss.html">Om Oss</a>
      </nav>

      <div class="user-icon">
        <img src="/assets/icon.png" alt="Bruker profil" />
      </div>
    </header>

    <main class="container" aria-labelledby="booking-tittel">
      <p id="pageMessage" role="status" aria-live="polite"></p>

      <section class="hero" aria-label="Ny booking">
        <article class="hero-content">
          <header>
            <h1 id="booking-tittel">Ny booking</h1>
            <p class="location">Send inn en bookingforespørsel</p>
          </header>

          <form id="newBookingForm" class="booking-form">
            <input type="hidden" id="userId" name="userId" value="" />

            <label for="roomId">Rom</label>
            <select id="roomId" name="roomId" required>
              <option value="" selected disabled>Velg rom</option>
            </select>

            <label for="fromDate">Fra dato</label>
            <input type="date" id="fromDate" name="fromDate" required />

            <label for="toDate">Til dato</label>
            <input type="date" id="toDate" name="toDate" required />

            <label for="message">Melding</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <button class="btn" type="submit" id="createBookingBtn">Bestill nå</button>
          </form>
        </article>

        <figure class="hero-image">
          <img src="/assets/image01.png" alt="Hotellrom" />
        </figure>
      </section>

      <section class="booking-list-section" aria-labelledby="mine-bookinger">
        <h2 id="mine-bookinger">Mine bookinger</h2>

        <div id="bookingsList"></div>
        <p id="emptyState" hidden>Ingen bookinger enda.</p>
      </section>
    </main>

    <footer class="footer">
      <nav class="socials">
        <a href="https://github.com/HakonBergtun/stay/tree/main">
          <img src="assets/github.png" alt="link til github side" />
        </a>
        <a href="https://www.facebook.com/">
          <img src="assets/facebook.png" alt="link til Facebook side" />
        </a>
        <a href="https://www.instagram.com/?flo=true">
          <img src="assets/instagram-.png" alt="link til Instagram side" />
        </a>
      </nav>

      <p class="footer-bottom">Besøk våre sosiale medier 😄</p>
    </footer>

    <script src="JS/navbar.js" defer></script>
  </body>
</html>
