<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrer – Stay Bed & Breakfast</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header class="header">
  <nav class="navbar" aria-label="Main navigation">
    <a class="logo" href="index.html">Stay Bed & Breakfast</a>
          <div class="hamburger" id="hamburger">
        <img src="assets/menu.png" alt="meny" />
      </div>

      <nav class="nav-links" id="nav-links">
        <a href="index.html">Hjem</a>
        <a href="kontaktoss.html">Kontakt Oss</a>
        <a href="FAQ.html">FAQ</a>
        <a href="omoss.html">Om Oss</a>
      </nav>

      <div class="user-icon">
        <img src="/assets/icon.png" alt="Bruker profil" />
      </div>
    <ul class="menu">
      <li><a href="register.html">Registrer</a></li>
      <li><a href="signin.html">Logg inn</a></li>
    </ul>
  </nav>
</header>

<main class="auth-main">
  <section class="auth-card">

    <header class="auth-heading">
      <h1>Lag en ny konto</h1>
      <p>Har allerede en bruker? <a href="signin.html">Logg inn</a></p>
    </header>

    <form class="auth-form" aria-label="Create account form">

      <div class="form-row two-col" aria-label="Name">
        <div class="field">
          <label for="first-name">Fornavn</label>
          <input type="text" id="first-name" name="first_name" placeholder="John" required>
        </div>
        <div class="field">
          <label for="last-name">Etternavn</label>
          <input type="text" id="last-name" name="last_name" placeholder="Doe" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="john@example.com" required>
      </div>

      <div class="form-row two-col">
        <div class="field">
          <label for="phone">Telefonnummer</label>
          <input type="tel" id="phone" name="phone" placeholder="+47 000 00 000">
        </div>
        <div class="field">
          <label for="dob">Fødselsdato</label>
          <input type="date" id="dob" name="dob">
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
      </div>

      <div class="field">
        <label for="confirm-password">Bekreft password</label>
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your password" required>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" required>
          I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
        </label>

      <button type="submit" class="btn-submit">Lag konto</button>

    </form>

  </section>
</main>

<footer class="footer">
  <p>© 2026 Stay Bed & Breakfast</p>
</footer>

</body>
</html>
